name: Intention Check (Anti-Bypass)

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-intention:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier la présence du Pourquoi
        run: |
          BODY="${{ github.event.pull_request.body }}"
          
          # Extrait le texte après 'intention' ou 'pourquoi'
          INTENTION_TEXT=$(echo "$BODY" | grep -ioE "(intention|pourquoi).*" || true)
          
          if [ ${#INTENTION_TEXT} -ge 30 ]; then
            echo "✅ Intention détaillée détectée dans la description de la PR."
            exit 0
          else
            echo "❌ ERREUR: Le Playbook GEF exige que chaque Pull Request explique explicitement et en détail le 'Pourquoi' (l'intention métier)."
            echo "Votre intention est absente ou trop courte. Veuillez modifier la description de votre Pull Request pour y inclure un bloc décrivant votre intention d'au moins quelques phrases."
            exit 1
          fi
